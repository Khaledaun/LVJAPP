# LVJ AssistantApp · per-PR CI
#
# Two jobs:
#
#   1. gates (REQUIRED) — the per-PR audit gate from docs/EXECUTION_PLAN.md §2.4.
#      Enforces the invariants this PR introduces: auth-on-every-route (A-002),
#      dynamic-route (A-005, D-025 item 4),
#      tenant-isolation (A-003, D-023 — blocking since Sprint 0.5.1),
#      jurisdiction sweep, doc discipline, prisma additive-only. Must be green
#      to merge.
#
#   2. legacy-checks (INFORMATIONAL) — tsc/lint/test/build/smoke. Runs with
#      continue-on-error because `origin/main` carries ~41 pre-existing TS
#      errors (recharts/React type drift, Prisma enum re-exports,
#      lib/agents/invoke.ts generics, test-utils Session shape). Fixing those
#      is tracked separately (Issue #11 safe-half); until then we publish the
#      output as annotations rather than block unrelated PRs on it.
#
# When the legacy-cleanup PR lands, flip continue-on-error off and fold these
# back into the required gate.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: AssistantAPP-main

jobs:
  gates:
    name: gates · audits (required)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A-010 (doc discipline) and C-004 (prisma audit) diff against
          # origin/main, so we need the full history — the default shallow
          # clone would fail with "fatal: bad revision 'origin/main...HEAD'".
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AssistantAPP-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: A-002 · auth-on-every-route audit
        run: npm run audit:auth

      - name: A-005 · dynamic-route audit (D-025 item 4)
        run: npm run audit:dynamic

      - name: A-004 · jurisdiction audit (informational)
        run: npm run audit:jurisdiction

      - name: A-011 · KB freshness audit (informational)
        run: npm run audit:kb

      - name: A-010 · doc-discipline audit
        run: npm run audit:docs -- --base origin/main --head HEAD
        if: github.event_name == 'pull_request'

      - name: C-004 · prisma additive-only audit
        working-directory: .
        run: cd AssistantAPP-main && npm run audit:prisma -- --base origin/main --head HEAD
        if: github.event_name == 'pull_request'

      - name: A-003 · tenant-isolation audit (blocking since Sprint 0.5.1)
        run: npm run audit:tenant

      - name: A-012 · advice_class gatekeeping audit (PRD R1)
        run: npm run audit:advice-class

      - name: A-013 · audit-chain completeness audit (informational)
        run: npm run audit:chain
        continue-on-error: true

  legacy-checks:
    name: legacy-checks · tsc/lint/test/build/smoke (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SKIP_DB: "1"
      SKIP_AUTH: "1"
      WEBFLOW_WEBHOOK_SECRET: test-webflow-secret-not-used-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AssistantAPP-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (Jest)
        run: npm test -- --ci --maxWorkers=2
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Smoke battery (S-003 auth, S-009 webflow, S-010 locale)
        run: npm run smoke
        continue-on-error: true

      - name: Upload smoke artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            AssistantAPP-main/test-results
            AssistantAPP-main/playwright-report
          retention-days: 7
