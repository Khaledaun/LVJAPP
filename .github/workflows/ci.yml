# LVJ AssistantApp · per-PR CI
#
# Implements the per-PR audit gate from docs/EXECUTION_PLAN.md §2.4
# and the smoke battery from §3.1. Today: A-002 (auth audit), unit
# tests, and the auth/locale/webflow smokes.
#
# Future jobs land per sprint:
#   - A-003 tenant-isolation audit (Sprint 0.5)
#   - A-004 jurisdiction sweep
#   - A-008 dep audit
#   - S-005 AOS golden loop (when DB is wired)

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on new pushes to the same PR — keeps CI cost
# inside docs/EXECUTION_PLAN.md §0.3 budgets.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: AssistantAPP-main

jobs:
  audit-and-test:
    name: A-002 · unit · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Sandbox-without-DB discipline (EXECUTION_PLAN §9.5). Real DB
      # job lands as a separate workflow when Sprint 0.5 ships.
      SKIP_DB: "1"
      SKIP_AUTH: "1"
      WEBFLOW_WEBHOOK_SECRET: test-webflow-secret-not-used-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AssistantAPP-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: A-002 · auth-on-every-route audit
        run: npm run audit:auth

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test -- --ci --maxWorkers=2

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke battery (S-003 auth, S-009 webflow, S-010 locale)
        run: npm run smoke

      - name: Upload smoke artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            AssistantAPP-main/test-results
            AssistantAPP-main/playwright-report
          retention-days: 7
